<article id="item-summary-markdown" class="summary-long markdown-body">ソフトウェアの工数見積もりは長年にわたる研究テーマであり、多くの入門書や実践書が存在する。しかし、現場で「常識」とされる見積もり手法の多くは、一次資料を遡っても実証的な根拠が確認できない場合がある。特に、確率分布が適用できないような、見積もりからの大幅な超過が発生する領域への対応が、従来の研究では不十分である。</article>
